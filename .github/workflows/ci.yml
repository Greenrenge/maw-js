name: CI

on:
  push:
    branches: [alpha, main]
  pull_request:
    branches: [alpha, main]

jobs:
  test:
    # Fast suites — single runner each. test-unit and test-isolated are split
    # out below into sharded matrices (test-unit because mock.module is
    # process-global and benefits from --isolate; test-isolated because it's
    # the slowest at 79 per-file subprocesses).
    runs-on: ubuntu-latest
    strategy:
      matrix:
        suite:
          - name: plugin
            script: test:plugin
          - name: mock-smoke
            script: test:mock-smoke
    name: test-${{ matrix.suite.name }}
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Cache bun deps
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lock') }}
          restore-keys: bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup ghq
        uses: ./.github/actions/setup-ghq

      - name: Run ${{ matrix.suite.name }} tests
        env:
          MAW_SKIP_FLAKY: "1"
        run: bun run ${{ matrix.suite.script }}

  # test-unit shards the 102-file unit suite 8-way using Bun 1.3.13's native
  # --shard=N/M + --isolate flags. --isolate is essential — 31 of the 102
  # files use mock.module() which is process-global, so without per-file
  # isolation a shard's tests can leak mocks into siblings. (#1278)
  #
  # #1348 — timeout-minutes guards against Bun --isolate crashes that hang
  # the runner indefinitely (panic: Option::unwrap() on None). Normal shard
  # completes in <30s; 5 min is generous enough to catch real slowdowns
  # while failing fast on hung shards. Rerun --failed usually passes.
  test-unit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5, 6, 7, 8]
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Cache bun deps
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lock') }}
          restore-keys: bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup ghq
        uses: ./.github/actions/setup-ghq

      - name: Run unit tests (shard ${{ matrix.shard }}/8)
        env:
          MAW_SKIP_FLAKY: "1"
          MAW_TEST_MODE: "1"
        run: |
          bun test --shard=${{ matrix.shard }}/8 --isolate \
            --path-ignore-patterns '**/test/isolated/**' \
            --path-ignore-patterns '**/zz-mock-tmux-smoke*' \
            --path-ignore-patterns '**/agents/**'

  # test-isolated is the slowest CI job — 79 test files × bun startup, all
  # sequential because Bun's mock.module is process-global. Each subprocess
  # is already independent, so we shard 8-way for ~8x wall-clock speedup.
  # (#1257)
  test-isolated:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5, 6, 7, 8]
    # No explicit `name:` — GitHub's default matrix naming is `test-isolated (N)`
    # which renders cleanly in the PR checks list. The previous explicit
    # `test-isolated (${{ matrix.shard }}/8)` form was noisier.
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Cache bun deps
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lock') }}
          restore-keys: bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup ghq
        uses: ./.github/actions/setup-ghq

      - name: Run isolated tests (shard ${{ matrix.shard }}/8)
        # MAW_SKIP_FLAKY=1 — override list (#811/#813 precedent).
        # Currently skips:
        #   - test/integration/federation-local.test.ts (#830 — port-binding
        #     race in 2-port localhost /info round-trip; the test binds to
        #     ephemeral ports allocated via getEphemeralPort() and a
        #     concurrent CI job can grab the same port between close+spawn).
        # Root-cause mitigations also live in the test file (SO_REUSEADDR,
        # retry, fail-fast on subprocess exit, 60s deadline). The override
        # is a belt-and-braces measure to keep CI green while we monitor.
        env:
          MAW_SKIP_FLAKY: "1"
        run: bash scripts/test-isolated.sh --shard ${{ matrix.shard }}/8

  build:
    runs-on: ubuntu-latest
    needs: [test, test-unit, test-isolated]
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Cache bun deps
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lock') }}
          restore-keys: bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build CLI
        run: bun build --target=bun src/cli.ts

      - name: Validate plugin manifests
        run: |
          fail=0
          for f in src/commands/plugins/*/plugin.json; do
            if ! bun -e "JSON.parse(require('fs').readFileSync('$f','utf-8'))" 2>/dev/null; then
              echo "✗ $(basename $(dirname $f))"; fail=1
            fi
          done
          echo "✓ $(ls src/commands/plugins/*/plugin.json | wc -l) manifests valid"
          exit $fail

      - name: Verify structure
        run: |
          root=$(ls src/*.ts 2>/dev/null | wc -l)
          cmd=$(ls src/commands/*.ts 2>/dev/null | wc -l)
          echo "src/ root: $root (expect ≤2) | commands/ root: $cmd (expect 0)"
          [ "$root" -le 2 ] && [ "$cmd" -eq 0 ] || exit 1

      # #1115 — validate generated docker-compose.yml passes docker schema
      - name: Validate fleet compose YAML
        run: |
          bun src/cli.ts fleet compose --validate
