name: CI

on:
  push:
    branches: [alpha, main]
  pull_request:
    branches: [alpha, main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite:
          - name: unit-1of4
            run: bun run test -- --shard 1/4
          - name: unit-2of4
            run: bun run test -- --shard 2/4
          - name: unit-3of4
            run: bun run test -- --shard 3/4
          - name: unit-4of4
            run: bun run test -- --shard 4/4
          - name: isolated-1of4
            run: bun run test:isolated -- --shard 1/4
          - name: isolated-2of4
            run: bun run test:isolated -- --shard 2/4
          - name: isolated-3of4
            run: bun run test:isolated -- --shard 3/4
          - name: isolated-4of4
            run: bun run test:isolated -- --shard 4/4
          - name: plugin
            run: bun run test:plugin
          - name: mock-smoke
            run: bun run test:mock-smoke
    name: test-${{ matrix.suite.name }}
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Cache bun deps
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lock') }}
          restore-keys: bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # ghq is used by cmdWake, cmd-update, plugin-bootstrap, find, done.
      # Without it, isolated tests shell out and print "ghq: not found" noise
      # (even when the test itself passes). Install the binary so CI logs
      # stay quiet and any future test that depends on ghq output works.
      - name: Install ghq
        run: |
          go install github.com/x-motemen/ghq@latest
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Run ${{ matrix.suite.name }} tests
        # MAW_SKIP_FLAKY=1 — override list (#811/#813 precedent).
        # Currently skips:
        #   - test/integration/federation-local.test.ts (#830 — port-binding
        #     race in 2-port localhost /info round-trip; the test binds to
        #     ephemeral ports allocated via getEphemeralPort() and a
        #     concurrent CI job can grab the same port between close+spawn).
        # Root-cause mitigations also live in the test file (SO_REUSEADDR,
        # retry, fail-fast on subprocess exit, 60s deadline). The override
        # is a belt-and-braces measure to keep CI green while we monitor.
        env:
          MAW_SKIP_FLAKY: "1"
        run: ${{ matrix.suite.run }}

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Cache bun deps
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lock') }}
          restore-keys: bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build CLI
        run: bun build src/cli.ts --outfile dist/maw --target=bun --minify --external @eclipse-zenoh/zenoh-ts

      - name: Validate plugin manifests
        run: |
          fail=0
          for f in src/commands/plugins/*/plugin.json; do
            if ! bun -e "JSON.parse(require('fs').readFileSync('$f','utf-8'))" 2>/dev/null; then
              echo "✗ $(basename $(dirname $f))"; fail=1
            fi
          done
          echo "✓ $(ls src/commands/plugins/*/plugin.json | wc -l) manifests valid"
          exit $fail

      - name: Verify structure
        run: |
          root=$(ls src/*.ts 2>/dev/null | wc -l)
          cmd=$(ls src/commands/*.ts 2>/dev/null | wc -l)
          echo "src/ root: $root (expect ≤2) | commands/ root: $cmd (expect 0)"
          [ "$root" -le 2 ] && [ "$cmd" -eq 0 ] || exit 1
